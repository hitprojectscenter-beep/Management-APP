<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="המרכז למיפוי ישראל">
  <defs>
    <!-- Curved path for Hebrew text along the bottom arc -->
    <path id="mapiTextPath" d="M 35,130 A 95,95 0 0 0 225,130" fill="none"/>
  </defs>

  <!-- Outer blue ring -->
  <circle cx="130" cy="130" r="105" fill="none" stroke="#1e5fa8" stroke-width="4"/>

  <!-- Globe / grid background centered -->
  <g transform="translate(130, 118)">
    <!-- Outer circle of the globe (lighter) -->
    <circle cx="0" cy="0" r="68" fill="#ffffff" stroke="#1e5fa8" stroke-width="2.5"/>

    <!-- Latitude lines (horizontal ellipses) -->
    <ellipse cx="0" cy="0" rx="68" ry="22" fill="none" stroke="#1e5fa8" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="68" ry="44" fill="none" stroke="#1e5fa8" stroke-width="1.5" opacity="0.7"/>

    <!-- Equator -->
    <line x1="-68" y1="0" x2="68" y2="0" stroke="#1e5fa8" stroke-width="1.8"/>

    <!-- Longitude lines (vertical ellipses / meridians) -->
    <line x1="0" y1="-68" x2="0" y2="68" stroke="#1e5fa8" stroke-width="1.8"/>
    <ellipse cx="0" cy="0" rx="22" ry="68" fill="none" stroke="#1e5fa8" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="44" ry="68" fill="none" stroke="#1e5fa8" stroke-width="1.5" opacity="0.7"/>

    <!-- Stylized central emblem - abstract key/tower shape -->
    <g fill="#1e5fa8">
      <!-- Top rounded head -->
      <ellipse cx="0" cy="-42" rx="18" ry="14"/>
      <!-- Inner cutout -->
      <ellipse cx="0" cy="-42" rx="9" ry="6" fill="#ffffff"/>
      <!-- Vertical shaft connecting head to swoosh -->
      <rect x="-5" y="-32" width="10" height="42" rx="2"/>
      <!-- Curved swoosh at bottom (wave / mapping line) -->
      <path d="M -42,18 Q -20,38 8,30 Q 28,24 42,10 L 38,4 Q 26,18 8,22 Q -16,28 -38,12 Z"/>
    </g>

    <!-- Center accent dot -->
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>

  <!-- Curved Hebrew text along bottom arc -->
  <text font-family="Arial, 'Assistant', 'Heebo', sans-serif" font-size="19" font-weight="700" fill="#1e5fa8" letter-spacing="0.5">
    <textPath href="#mapiTextPath" startOffset="50%" text-anchor="middle">
      המרכז למיפוי ישראל
    </textPath>
  </text>
</svg>
